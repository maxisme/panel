version: '3.1'
services:
  panel:
    container_name: panel
    image: maxisme/panel
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - "./src:/app"
    depends_on:
      - redis
      - worker
    ports:
      - 8000:8000
  worker:
    container_name: worker
    image: maxisme/panel
    command: python manage.py rqworker high default low
    restart: always
    volumes:
      - '/lib/modules:/lib/modules'
      - '/sys:/sys'
      - "./src:/app"
    devices:
      - '/dev/ttyAMA0:/dev/ttyAMA0'
      - '/dev/mem:/dev/mem'
    privileged: true

  redis:
    image: redis
    restart: always
